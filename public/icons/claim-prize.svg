<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Gift box body -->
  <rect x="12" y="30" width="40" height="24" rx="3" fill="#FFF3E0" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gift box lid -->
  <rect x="10" y="24" width="44" height="8" rx="2" fill="#FFF3E0" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ribbon vertical -->
  <line x1="32" y1="24" x2="32" y2="54" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ribbon horizontal -->
  <line x1="12" y1="38" x2="52" y2="38" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bow -->
  <path d="M32 24 C28 18 22 16 24 12 C26 8 30 10 32 16" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#f7931a" fill-opacity="0.15"/>
  <path d="M32 24 C36 18 42 16 40 12 C38 8 34 10 32 16" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#f7931a" fill-opacity="0.15"/>
  <!-- Lightning bolt on box -->
  <path d="M28 36 L33 36 L30 42 L36 42 L29 52 L31 46 L26 46 Z" fill="#f7931a" opacity="0.3"/>
  <!-- Sparkles -->
  <circle cx="8" cy="18" r="1.5" fill="#22c55e"/>
  <circle cx="56" cy="18" r="1.5" fill="#0EA5E9"/>
  <circle cx="52" cy="8" r="1" fill="#f7931a"/>
  <circle cx="12" cy="10" r="1" fill="#f7931a"/>
</svg>