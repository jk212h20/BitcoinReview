<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Compass circle -->
  <circle cx="32" cy="32" r="26" fill="#FFF3E0" stroke="#f7931a" stroke-width="2"/>
  <circle cx="32" cy="32" r="22" stroke="#e8850f" stroke-width="1" opacity="0.3"/>
  <!-- Compass needle -->
  <polygon points="32,12 28,32 32,36 36,32" fill="#f7931a" opacity="0.9"/>
  <polygon points="32,52 28,32 32,28 36,32" fill="#94a3b8" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#e8850f"/>
  <!-- Cardinal marks -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="#f7931a" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="56" stroke="#f7931a" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="12" y2="32" stroke="#f7931a" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="56" y2="32" stroke="#f7931a" stroke-width="2" stroke-linecap="round"/>
  <!-- Question mark overlay -->
  <text x="46" y="54" font-family="system-ui" font-size="18" font-weight="bold" fill="#f7931a" opacity="0.7">?</text>
</svg>
